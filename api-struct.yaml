openapi: 3.2.0

info:
  title: Student Grades API
  description: A simple REST API for managing student grades
  version: 1.0.0

servers:
  - url: http://localhost:5000
    description: Local development server

paths:
  /students:
    get:
      summary: Get all students
      responses:
        200:
          description: A list of students
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Student'
    
    post:
      summary: Create a new student
      description: Create a new student with their grade
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Student'
      responses:
        201:
          description: Student created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Student'
      
    /students/{student_id}:
      get:
        summary: Get a student by ID
        parameters:
          - name: student_id
            in: path
            required: true
            schema:
              type: integer
        responses:
          200:
            description: Student found
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/Student'
          404:
            description: Student not found

components:
  schemas:
    Student:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        subject:
          type: string
        grade:
          type: integer
      required:
        - id
        - name
        - subject
        - grade
    NewStudent:
      type: object
      properties:
        name:
          type: string
        subject:
          type: string
        grade:
          type: integer
      required:
        - name
        - subject
        - grade
        
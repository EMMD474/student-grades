openapi: 3.0.3
info:
  title: Student Grades API
  description: A simple REST API for managing student grades
  version: 1.0.0

servers:
  - url: http://localhost:5000
    description: Local development server

paths:
  /:
    get:
      summary: Welcome message
      responses:
        200:
          description: Welcome message
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string

  /students:
    get:
      summary: Get all students and grades
      responses:
        200:
          description: A list of students and their grades
          content:
            application/json:
              schema:
                type: object
                properties:
                  students:
                    type: array
                    items:
                      $ref: '#/components/schemas/Student'
                  grades:
                    type: array
                    items:
                      $ref: '#/components/schemas/Grade'
    
    post:
      summary: Create a new student
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NewStudent'
      responses:
        201:
          description: Student created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Student'
        400:
          description: Invalid input

  /students/{student_id}:
    get:
      summary: Get a student by ID
      parameters:
        - name: student_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        200:
          description: Student found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Student'
        404:
          description: Student not found

  /student-grades:
    post:
      summary: Add a grade to a student
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GradeInput'
      responses:
        201:
          description: Grade added successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Grade'
        400:
          description: Invalid input
        404:
          description: Student not found

components:
  schemas:
    Student:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
      required:
        - id
        - name
    
    NewStudent:
      type: object
      properties:
        name:
          type: string
      required:
        - name

    Grade:
      type: object
      properties:
        student_id:
          type: integer
        subject:
          type: string
        grade:
          type: integer
      required:
        - student_id
        - subject
        - grade

    GradeInput:
      type: object
      properties:
        student_id:
          type: integer
        subject:
          type: string
        grade:
          type: integer
      required:
        - student_id
        - subject
        - grade
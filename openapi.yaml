openapi: 3.0.0
info:
  title: Student Grades API
  description: A simple REST API for managing student grades
  version: 1.0.0

servers:
  - url: http://localhost:5000

paths:

  /students:
    get:
      summary: Get all students and their grades
      responses:
        '200':
          description: List of students
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Student'

    post:
      summary: Add a new student grade
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StudentInput'

      responses:
        '201':
          description: Student created successfully
        '400':
          description: Invalid input

  /students/{id}:
    get:
      summary: Get a student by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer

      responses:
        '200':
          description: Student found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Student'

        '404':
          description: Student not found

components:

  schemas:

    Student:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        subject:
          type: string
        grade:
          type: integer

    StudentInput:
      type: object
      required:
        - name
        - subject
        - grade
      properties:
        name:
          type: string
        subject:
          type: string
        grade:
          type: integer